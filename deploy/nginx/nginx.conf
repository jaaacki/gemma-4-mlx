events {}

http {
  # JSON access log for the SQLite tailer (cmd/tailer).
  # NOTE: $request_time / $upstream_response_time are in SECONDS (decimal);
  # the Go parser multiplies by 1000 to get ms. upstream_response_time is
  # quoted as a string because nginx writes a literal "-" when no upstream
  # was contacted (e.g. a 404 served by nginx itself), which would otherwise
  # produce invalid JSON (`"upstream_ms":-`).
  log_format json_combined escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"duration_ms":$request_time,'
    '"upstream_ms":"$upstream_response_time"'
  '}';

  # Filename chosen so host path is state/nginx-access.log (tailer default).
  access_log /var/log/nginx/nginx-access.log json_combined;
  error_log /dev/stderr info;

  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_connect_timeout 30s;

  server {
    listen 8080;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_pass http://host.docker.internal:8000;
    }
  }
}
